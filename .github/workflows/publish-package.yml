name: Publish package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm run setup

      - name: Run lint and typecheck
        run: |
          npm run lint
          npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Build package
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to npm (via OIDC)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'release' && github.event.action == 'published' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          scope: '@ministryofjustice'
          cache: npm

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm run setup

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Check version and publish
        run: |
          name=$(jq -r .name package.json)
          version=$(jq -r .version package.json)
          latest_version=$(npm view "$name" version --silent 2>/dev/null || echo "unpublished")

          echo "Checking $name..."
          echo "Current version: $version"
          echo "Latest published: $latest_version"

          if [ "$version" == "$latest_version" ]; then
            echo "$name@$version already published; skipping."
          else
            echo "Removing prepare script for CI..."
            tmpfile=$(mktemp)
            jq 'del(.scripts.prepare)' package.json > "$tmpfile" && mv "$tmpfile" package.json

            echo "Publishing $name@$version to npm..."
            npm publish --provenance --access public
          fi
