name: Pipeline [build → test → tag]

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: write
  id-token: write

jobs:
  node_build:
    name: Node build
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_build.yml@v2
    secrets: inherit
    with:
      install_command: 'npm run setup'

  node_unit_tests:
    name: Node unit tests
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_unit_tests.yml@v2
    needs: [node_build]
    secrets: inherit

  node_integration_tests:
    name: Node integration tests
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/node_integration_tests.yml@v2
    needs: [node_build]
    secrets: inherit

  auto_tag:
    name: Auto tag if version changed (main only)
    runs-on: ubuntu-latest
    needs: [node_build, node_unit_tests, node_integration_tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0 # needed to compare versions and push tags

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm run setup

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check version difference
        id: version_check
        run: |
          # Get version in package.json in main from current commit and the commit before this push
          current_version=$(jq -r .version package.json)
          previous_version=$(git show "${{ github.event.before }}:package.json" | jq -r .version 2>/dev/null || echo "0.0.0")

          echo "Current: $current_version"
          echo "Previous: $previous_version"

          if [ "$current_version" = "$previous_version" ]; then
            echo "Version number in package.json has not been updated."
            echo "Please bump the version before merging to main."
            exit 1
          fi

          echo "Version changed from $previous_version to $current_version"
          echo "version=$current_version" >> $GITHUB_OUTPUT

      - name: Create and push Git tag
        if: success()
        run: |
          version=${{ steps.version_check.outputs.version }}
          tag="v${version}"

          echo "Creating tag $tag"

          # Avoid duplicate tags
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Release tag $tag already exists - skipping."
          else
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
            echo "Tag $tag created and pushed."
          fi
